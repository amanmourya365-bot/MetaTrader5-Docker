[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:xvfb]
command=Xvfb :1 -screen 0 1280x800x24 -nolisten tcp
autorestart=true
priority=1
startsecs=3
stdout_logfile=/var/log/xvfb.log
stderr_logfile=/var/log/xvfb.log

[program:openbox]
command=bash -c "sleep 5 && DISPLAY=:1 openbox --sm-disable"
autorestart=true
priority=2
startsecs=3
startretries=5
stdout_logfile=/var/log/openbox.log
stderr_logfile=/var/log/openbox.log

[program:x11vnc]
command=bash -c "sleep 8 && x11vnc -display :1 -nopw -forever -shared -rfbport 5900 -noxdamage"
autorestart=true
priority=3
startsecs=5
stdout_logfile=/var/log/x11vnc.log
stderr_logfile=/var/log/x11vnc.log

[program:novnc]
command=bash -c "sleep 10 && websockify --web /usr/share/novnc %(ENV_PORT)s localhost:5900"
autorestart=true
priority=4
startsecs=5
stdout_logfile=/var/log/novnc.log
stderr_logfile=/var/log/novnc.log

[program:mt5]
command=bash -c "sleep 15 && DISPLAY=:1 WINEPREFIX=/root/.wine WINEARCH=win32 wine /root/.wine/drive_c/Program\ Files/MetaTrader\ 5/terminal64.exe"
autorestart=false
priority=5
stdout_logfile=/var/log/mt5.log
stderr_logfile=/var/log/mt5.log
