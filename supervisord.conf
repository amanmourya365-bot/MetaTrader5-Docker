[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:xvfb]
command=Xvfb :1 -screen 0 1280x800x24 -nolisten tcp
autorestart=true
priority=1
stdout_logfile=/var/log/xvfb.log
stderr_logfile=/var/log/xvfb.log

[program:openbox]
command=openbox --display :1
autorestart=true
priority=2
environment=DISPLAY=":1"
stdout_logfile=/var/log/openbox.log
stderr_logfile=/var/log/openbox.log

[program:x11vnc]
command=x11vnc -display :1 -nopw -forever -shared -rfbport 5900
autorestart=true
priority=3
stdout_logfile=/var/log/x11vnc.log
stderr_logfile=/var/log/x11vnc.log

[program:novnc]
command=websockify --web /usr/share/novnc 3000 localhost:5900
autorestart=true
priority=4
stdout_logfile=/var/log/novnc.log
stderr_logfile=/var/log/novnc.log

[program:mt5]
command=/Metatrader/start.sh
autorestart=false
priority=5
environment=DISPLAY=":1",WINEPREFIX="/config/.wine",WINEDEBUG="-all"
stdout_logfile=/var/log/mt5.log
stderr_logfile=/var/log/mt5.log
